<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Promo Code</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        #code-display { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 25px 0; 
            padding: 15px;
            background: #e8f4fd;
            border: 2px dashed #3498db;
            color: #2980b9;
            display: none; /* Κρυφό μέχρι να πατηθεί το κουμπί */
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px;
            transition: background 0.3s;
        }
        button:hover { background: #2980b9; }
        .instruction {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Καλώς ήρθατε στο Early Access!</h1>
        <p>Πατήστε το κουμπί για να λάβετε έναν μοναδικό κωδικό προσφοράς για την εφαρμογή:</p>
        
        <button onclick="getCode()">Λήψη Κωδικού</button>
        
        <div id="code-display"></div>
        
        <!-- Η οδηγία που ζήτησες -->
        <p class="instruction">
            Αν ο κωδικός που εμφανίστηκε έχει ήδη χρησιμοποιηθεί, παρακαλούμε πατήστε ξανά το κουμπί για έναν νέο.
        </p>
    </div>

    <script>
        function getCode() {
            fetch('codes.json')
                .then(response => response.json())
                .then(data => {
                    const randomIndex = Math.floor(Math.random() * data.length);
                    const selectedCode = data[randomIndex];
                    
                    const display = document.getElementById('code-display');
                    display.innerText = selectedCode;
                    display.style.display = 'block'; // Εμφάνιση του πλαισίου
                })
                .catch(err => {
                    console.error('Σφάλμα κατά τη φόρτωση:', err);
                    alert('Προέκυψε σφάλμα. Βεβαιωθείτε ότι το αρχείο codes.json υπάρχει στο σωστό σημείο.');
                });
        }
    </script>
</body>
</html>
